name: Deploy MultiK8s
on:
  push:
    branches:
      - main

env:
  SHA: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Test
        run: |-
          docker build -t ${{ secrets.DOCKER_USERNAME }}/react-test -f ./client/Dockerfile.dev ./client
          docker run -e CI=true ${{ secrets.DOCKER_USERNAME }}/react-test npm test

      - name: Build images
        run: |-
          docker build -t ${{ secrets.DOCKER_USERNAME }}/multi-client-k8s-gh:latest -t ${{ secrets.DOCKER_USERNAME }}/multi-client-k8s-gh:${{ env.SHA }} -f ./client/Dockerfile ./client
          docker build -t ${{ secrets.DOCKER_USERNAME }}/multi-server-k8s-gh:latest -t ${{ secrets.DOCKER_USERNAME }}/multi-server-k8s-gh:${{ env.SHA }} -f ./server/Dockerfile ./server
          docker build -t ${{ secrets.DOCKER_USERNAME }}/multi-worker-k8s-gh:latest -t ${{ secrets.DOCKER_USERNAME }}/multi-worker-k8s-gh:${{ env.SHA }} -f ./worker/Dockerfile ./worker

      - name: Push images
        run: |-
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-client-k8s-gh:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-server-k8s-gh:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-worker-k8s-gh:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/multi-client-k8s-gh:${{ env.SHA }}
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-server-k8s-gh:${{ env.SHA }}
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-worker-k8s-gh:${{ env.SHA }}

      - name: Deploy to EC2 Minikube
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |-
            cd /home/ubuntu/multi-k8s 
            git pull origin main 
            minikube status || minikube start --driver=docker 
            kubectl apply -f k8s 
            kubectl set image deployment/server-deployment server=${{ secrets.DOCKER_USERNAME }}/multi-server-k8s-gh:${{ github.sha }} 
            kubectl set image deployment/client-deployment client=${{ secrets.DOCKER_USERNAME }}/multi-client-k8s-gh:${{ github.sha }} 
            kubectl set image deployment/worker-deployment worker=${{ secrets.DOCKER_USERNAME }}/multi-worker-k8s-gh:${{ github.sha }} 
            
            kubectl rollout status deployment/server-deployment 
            kubectl rollout status deployment/client-deployment 
            kubectl rollout status deployment/worker-deployment