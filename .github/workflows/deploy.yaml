name: Deploy MultiDocker
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t nataliaveselova/react-test -f ./client/Dockerfile.dev ./client
      - run: docker run -e CI=true nataliaveselova/react-test npm test

      - run: docker build -t nataliaveselova/multi-client ./client
      - run: docker build -t nataliaveselova/multi-nginx ./nginx
      - run: docker build -t nataliaveselova/multi-server ./server
      - run: docker build -t nataliaveselova/multi-worker ./worker

      - run: docker push nataliaveselova/multi-client
      - run: docker push nataliaveselova/multi-nginx
      - run: docker push nataliaveselova/multi-server
      - run: docker push nataliaveselova/multi-worker


      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            sudo docker compose pull
            sudo docker compose down
            sudo docker compose up -d
            sudo docker image prune -f